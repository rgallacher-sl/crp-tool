@if (assessment) {
  <div class="complete-page">
    <div class="complete-content">
      <div class="check-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h2>Assessment recorded.</h2>

      <div class="summary">
        <div class="summary-row">
          <span class="summary-label">Supplier</span>
          <span class="summary-value">{{ assessment.supplierName }}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">PPN 006</span>
          <span class="summary-value outcome" [attr.data-outcome]="assessment.outcome">{{ outcomeLabel }}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Completed</span>
          <span class="summary-value">{{ completedDate }}</span>
        </div>
      </div>

      <a routerLink="/suppliers" class="btn-primary">
        Back to suppliers
      </a>
    </div>
  </div>
}
